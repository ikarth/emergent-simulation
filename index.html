<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Why You Like Emergent Simulation</title>
  <style>
    @font-face {
      font-family: 'Raleway';
      font-style: normal;
      font-weight: 400 600;
      font-display: swap;
      src: url('vendor/fonts/raleway-normal.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Raleway';
      font-style: italic;
      font-weight: 400;
      font-display: swap;
      src: url('vendor/fonts/raleway-italic.woff2') format('woff2');
    }
    @font-face {
      font-family: 'League Gothic';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('vendor/fonts/league-gothic.woff2') format('woff2');
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      /* Scale base em proportionally to viewport width.
         At 1920px → ~16px (unchanged); at 3840px → ~32px (2×). */
      font-size: clamp(14px, 0.85vw, 40px);
    }

    body {
      overflow: hidden;
      background: #F5F5F0;
      font-family: 'Raleway', system-ui, sans-serif;
    }

    /* p5.js canvas sits behind everything */
    canvas {
      display: block;
    }

    /* Slide content floats above the canvas */
    #slide-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #slide-content {
      max-width: 43vw;
      width: 78%;
      padding: 3.2vw 3.5vw;
      color: #2A2A2A;
      line-height: 1.65;
    }

    #slide-content h1,
    #slide-content h2,
    #slide-content h3 {
      font-family: 'League Gothic', impact, sans-serif;
      font-weight: 400;       /* League Gothic has only one weight */
      text-transform: uppercase;
      letter-spacing: 0.04em; /* condensed fonts breathe with a touch of tracking */
      line-height: 1.1;
    }
    #slide-content h1 {
      font-size: 3.6em;
      margin-bottom: 0.2em;
    }
    #slide-content h2 {
      font-size: 2.8em;
      margin-bottom: 0.25em;
    }
    #slide-content h3 {
      font-size: 2em;
      margin-bottom: 0.3em;
    }
    #slide-content p {
      font-size: 1.25em;
      margin-bottom: 0.85em;
    }
    #slide-content ul {
      font-size: 1.2em;
      margin-left: 1.6em;
      margin-bottom: 0.85em;
    }
    #slide-content li {
      margin-bottom: 0.45em;
    }
    #slide-content em {
      font-style: italic;
      color: #555;
    }
    #slide-content strong {
      font-weight: 600;
      color: #9c0f0f;
    }
    #slide-content del {
      text-decoration: line-through;
      color: #3e3d3f;
    }
    #slide-content figure {
      display: block;
      margin: 0.5em auto;
      max-width: 100%;
    }
    #slide-content figure img {
      display: block;
      width: 100%;
      height: auto;
      max-height: 52vh;
      margin: 0 auto;
    }
    #slide-content figure.img-right {
      float: right;
      max-width: 45%;
      margin: 0 0 0.75em 1.5em;
    }
    #slide-content figure.img-left {
      float: left;
      max-width: 45%;
      margin: 0 1.5em 0.75em 0;
    }
    #slide-content figcaption {
      font-size: 0.75em;
      color: #380f0f;
      text-align: center;
      margin-top: 0.35em;
      font-style: italic;
      line-height: 1.3;
    }
    /* Two-column layout via ||| divider in slide markdown */
    #slide-content .slide-columns {
      display: flex;
      gap: 2.5em;
      align-items: flex-start;
    }
    #slide-content .slide-col {
      flex: 1;
      min-width: 0; /* prevent flex children from overflowing */
    }
    #slide-content .slide-col figure img {
      max-height: 70vh;
    }
    /* Inside a column, floated figures make no sense — fill the column instead */
    #slide-content .slide-col figure.img-right,
    #slide-content .slide-col figure.img-left {
      float: none;
      max-width: 100%;
      width: 100%;
      margin: 0 0 0.75em 0;
    }

    /* Clear floats after the slide content block */
    #slide-content::after {
      content: '';
      display: block;
      clear: both;
    }
    #slide-content blockquote {
      font-size: 0.72em;
      color: #100a33;
      margin: 0.6em 0;
      padding-left: 1em;
      border-left: 2px solid #ddd;
      font-style: italic;
    }
    #slide-content blockquote p {
      font-size: 1em;
      margin-bottom: 0.3em;
    }

    /* Timer — upper right, very small */
    #timer {
      position: fixed;
      top: 12px;
      right: 16px;
      z-index: 20;
      font-size: 0.72em;
      color: #aaa;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.05em;
    }

    /* Slide progress dots — lower right */
    #slide-counter {
      position: fixed;
      bottom: 18px;
      right: 16px;
      z-index: 20;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .counter-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #bbb;
      opacity: 0.4;
    }
    .counter-dot.current {
      background: #555;
      opacity: 1;
    }
    .counter-dot.section-start {
      background: #888;
      opacity: 0.65;
    }

    /* Outline panel — slides in from the left */
    #outline-panel {
      position: fixed;
      top: 0;
      left: 0;
      width: 290px;
      height: 100%;
      z-index: 30;
      background: rgba(245, 245, 240, 0.96);
      border-right: 1px solid #ddd;
      padding: 44px 24px;
      overflow-y: auto;
      pointer-events: auto;
    }
    #outline-panel.hidden {
      display: none;
    }
    #outline-panel h3 {
      font-size: 0.78em;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 18px;
      font-family: 'Courier New', monospace;
    }
    .outline-item {
      padding: 7px 0;
      cursor: pointer;
      color: #444;
      font-size: 0.92em;
      border-bottom: 1px solid #eee;
      transition: color 0.1s;
    }
    .outline-item:hover {
      color: #000;
    }
    .outline-item.active {
      color: #000;
      font-weight: bold;
    }
    .outline-item.section {
      color: #aaa;
      font-size: 0.75em;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      cursor: default;
      padding-top: 14px;
    }

    /* Keyboard hint — lower left, very faint */
    #hint {
      position: fixed;
      bottom: 14px;
      left: 16px;
      z-index: 20;
      font-size: 0.65em;
      color: #ccc;
      font-family: 'Courier New', monospace;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="slide-overlay">
    <div id="slide-content"></div>
  </div>

  <div id="timer">0:00</div>
  <div id="slide-counter"></div>
  <div id="hint">← → navigate &nbsp; O outline &nbsp; X pause sim &nbsp; R restart</div>

  <div id="outline-panel" class="hidden">
    <h3>Outline</h3>
    <div id="outline-list"></div>
  </div>

  <!-- p5.js (global mode) — vendored for offline use -->
  <script src="vendor/p5.min.js"></script>
  <!-- html2canvas — rasterises the HTML overlay for the pixel-burn effect -->
  <script src="vendor/html2canvas.min.js"></script>

  <!-- Simulation and presentation scripts — order matters -->
  <script src="js/fields.js"></script>
  <script src="js/agents.js"></script>
  <script src="js/boids.js"></script>
  <script src="js/slime.js"></script>
  <script src="js/predator.js"></script>
  <script src="js/sugarscape.js"></script>
  <script src="js/slide-engine.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/sketch.js"></script>

</body>
</html>
